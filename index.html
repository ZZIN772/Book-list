
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>책읽기 목록</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="white">
    <meta name="apple-mobile-web-app-title" content="책읽기 목록">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
    <header class="header">
        <div class="header-top">
            <div>
                <h1>책읽기 목록</h1>
                <p class="subtitle">연도별 독서 리스트</p>
            </div>
            <button class="add-btn" onclick="openAddModal()">+ 책 추가</button>
        </div>
        <div class="year-selector" id="yearSelector"></div>
    </header>

    <ul class="book-list" id="bookList"></ul>

    <!-- 모달 -->
    <div class="modal-overlay" id="addModal" onclick="handleOverlayClick(event)">
        <div class="modal-content">
            <h3 id="modalTitle">책 추가</h3>
            <input id="newTitle" type="text" placeholder="책 제목">
            <input id="newAuthor" type="text" placeholder="저자">
            <input id="newYear" type="number" placeholder="연도 (예: 2025)">
            <div class="modal-buttons">
                <button class="cancel" onclick="closeAddModal()">취소</button>
                <button id="modalConfirmBtn" onclick="addBook()">추가</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(() => console.log("Service Worker 등록 완료"))
                .catch(err => console.log("SW 등록 실패:", err));
        }
    </script>
</body>
</html>
